# ========================================
# 微信个人号 AI 聊天机器人 配置模板
# 复制此文件为 config.yaml 并填入你的真实信息
# ========================================

# AI 模型配置 (支持 OpenAI 兼容 API)
llm:
  api_key: "sk-your-api-key-here"       # 你的 API Key（如 DeepSeek、OpenAI 等）
  model: "deepseek-chat"                 # 模型名称
  base_url: "https://api.deepseek.com"   # API 地址
  max_tokens: 1024
  temperature: 0.8

# 微信桥接
wechat:
  # 只回复这些人的消息（微信备注名/昵称），留空则回复所有人
  whitelist: []
  # 消息间隔（秒），避免过快回复
  min_interval: 5
  max_interval: 15

# ========================================
# 个人设定（机器人基于这些事实回复，不瞎编）
# 请如实填写，越详细越好
# ========================================
persona:
  # 基本信息
  name: "小明"
  city: "在北京上学"                     # 你在哪个城市？
  school: "XX大学"                       # 哪个学校？
  grade: "大三 计算机科学"               # 年级/专业
  age: "2000年出生"                      # 年龄

  # 日常生活
  daily_routine: "周一到周五上课，晚上在宿舍写代码"     # 日常在做什么？
  hobbies: "打篮球、看剧"                              # 爱好
  regular_spots: "图书馆、二食堂"                      # 常去的地方

  # 重要事实（机器人会严格遵守，按你的真实情况修改）
  facts:
    - "我现在是大学生，不是上班族"
    - "我住在学校宿舍"
    - "我晚上一般12点左右睡觉"

# ========================================
# 数据路径配置
# ========================================
data:
  # 聊天记录存放目录（用于分析说话风格）
  records_dir: "./data/chat_records"
  # 微信解密数据库路径（可选，用于直接读取消息数据库）
  # 获取方式：用 WeChatDB 解密工具解密微信数据库，填解密后的路径
  source_db: ""

# ========================================
# 微信数据库解密密钥（可选）
# 用于 msg_monitor.py 直接从加密数据库读取消息
# ========================================
db_key: "your-db-decrypt-key-here"
